name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    # windows-latest to match the only platform the app targets.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  rust:
    name: Rust (unit tests)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Library unit tests only. These cover the pure layer - desktop id
      # encoding, placement policy, and the port driven against its fake - none
      # of which need a webview or an interactive desktop session.
      - name: Unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Warnings are errors
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib -- -D warnings
