<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="noteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Sticky note body with folded corner -->
  <path d="M56,36 H416 Q436,36 436,56 V376 L336,476 H56 Q36,476 36,456 V56 Q36,36 56,36 Z"
        fill="url(#noteGrad)" filter="url(#shadow)" stroke="#F9A825" stroke-width="3"/>

  <!-- Corner fold -->
  <path d="M436,376 L336,476 L336,396 Q336,376 356,376 Z"
        fill="url(#foldGrad)" stroke="#F9A825" stroke-width="2"/>

  <!-- Share icon: three dots connected by lines -->
  <g transform="translate(236, 200)" stroke="#5D4037" stroke-width="10" fill="#5D4037" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top-right node -->
    <circle cx="80" cy="-50" r="22" fill="#FF7043" stroke="#E64A19" stroke-width="5"/>
    <!-- Middle-left node -->
    <circle cx="-40" cy="20" r="22" fill="#42A5F5" stroke="#1E88E5" stroke-width="5"/>
    <!-- Bottom-right node -->
    <circle cx="80" cy="90" r="22" fill="#66BB6A" stroke="#43A047" stroke-width="5"/>

    <!-- Connecting lines -->
    <line x1="-18" y1="8" x2="58" y2="-38" stroke="#5D4037" stroke-width="7" stroke-linecap="round"/>
    <line x1="-18" y1="32" x2="58" y2="78" stroke="#5D4037" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Ruled lines on sticky -->
  <line x1="80" y1="130" x2="300" y2="130" stroke="#E6C347" stroke-width="3" opacity="0.5"/>
  <line x1="80" y1="165" x2="260" y2="165" stroke="#E6C347" stroke-width="3" opacity="0.5"/>
</svg>
